name: DNS Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run monitoring
        run: timeout 300 python monitor.py || echo "Monitor timed out"
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          ENABLE_DELETE: "false"

      - name: Generate review list
        run: timeout 120 python generate_review_list.py || echo "Review step failed"
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

      - name: Run delete confirmation
        run: timeout 120 python delete_confirmed.py || echo "Delete step failed"
        env:
          ENABLE_DELETE: "false"
        continue-on-error: true

      - name: Debug output
        run: |
          echo "---- monitor_log.json ----"
          cat monitor_log.json || echo "missing"
          echo "---- review_list.json ----"
          cat review_list.json || echo "missing"

      - name: Commit updated state
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git pull --rebase || echo "No remote changes"
          git add monitor_log.json review_list.json
          git commit -m "Update monitoring state" || echo "No changes"
          git push || echo "Push skipped"

      - name: Notify on failure
        if: failure()
        run: echo "Workflow failed"
        run: echo "Workflow failed!"