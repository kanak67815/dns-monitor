name: DNS Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # -------------------------
      # Checkout Repo
      # -------------------------
      - name: Checkout code
        uses: actions/checkout@v3

      # -------------------------
      # Setup Python
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # -------------------------
      # AWS Auth
      # -------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # -------------------------
      # Run Monitoring
      # -------------------------
      - name: Run monitoring
        run: python monitor.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          ENABLE_DELETE: "false"

      # -------------------------
      # Generate Review List + Email Alert
      # -------------------------
      - name: Generate review list
        run: python generate_review_list.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

      # -------------------------
      # Delete Confirmed Domains (SAFE MODE)
      # -------------------------
      - name: Run delete confirmation
        run: python delete_confirmed.py
        env:
          ENABLE_DELETE: "false"
        continue-on-error: true

      # -------------------------
      # Debug (optional but useful)
      # -------------------------
      - name: Debug output
        run: |
          echo "---- monitor_log.json ----"
          cat monitor_log.json || echo "missing"
          echo "---- review_list.json ----"
          cat review_list.json || echo "missing"

      # -------------------------
      # Persist State (BEST METHOD)
      # -------------------------
      - name: Commit updated state
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add monitor_log.json review_list.json
          git commit -m "Update monitoring state" || echo "No changes"
          git push

      # -------------------------
      # Failure Notification
      # -------------------------
      - name: Notify on failure
        if: failure()
        run: echo "Workflow failed!"